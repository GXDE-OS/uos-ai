# AI知识库集成菜单配置
# 该菜单项仅支持file协议

[Menu Entry]
# 版本号（必需）
Version=1.0
# 描述信息
Comment=Add file to AI Knowledge Base
# 一级菜单项列表
Actions=Zero

[Menu Action Zero]
# 支持的文件选择类型：仅支持单选文件
X-DFM-MenuTypes=SingleFile
# 支持的文件后缀
X-DDE-FileManager-SupportSuffix=txt:doc:docx:xls:xlsx:ppt:pptx:pdf:md:png:jpeg:jpg:c:cc:cpp:c++:cxx:h:java:py:js:ts:rb:go:rs:php:pl:pm:swift:kt:kts:scala:sc:lua:r:m:dart:html:css:jsx:tsx:vue:svelte:ejs:pug:jade:handlebars:hbs:sh:bat:ps1:zsh:json:xml:yml:yaml:toml:ini:env:sql:gradle:pom:sln:csproj:vbproj:vcxproj:mustache:twig:scss:sass:less:jsp:aspx:erb:s:asm:v:vh:vhd:vhdl:cs:fs:fsx:hs:d:groovy:jl:elm:clj:cljs:cljc:erl:hrl:fsl:fsi:gitignore:tf:ipynb:htm
# 支持的协议：仅支持file协议
X-DFM-SupportSchemes=file
# 菜单显示名称
Name=Add to AI Knowledge Base
Name[zh_CN]=添加到AI知识库
# 菜单位置（数字越小越靠前）
PosNum=15
# 执行命令 - 使用%f参数传递选中文件的路径
Exec=dbus-send --session --dest=com.deepin.copilot --print-reply /org/deepin/copilot/chat org.deepin.copilot.chat.sendToKnowledgeBase array:string:"%f"
